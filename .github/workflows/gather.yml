name: gather

# Automated intel: fire it with a subject, Beak lights his candles and commits
# a cited brief to briefs/.
on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Subject to gather intel on (a concept or topic — never a person)"
        required: true
        default: "Topological insulator"

permissions:
  contents: write

concurrency:
  group: beak-gather
  cancel-in-progress: false

jobs:
  gather:
    name: light the candles
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Gather
        run: python beak.py "${{ inputs.topic }}" --save
      - name: Commit the brief (only if changed)
        run: |
          git config user.name "beak-savant[bot]"
          git config user.email "beak-savant@users.noreply.github.com"
          git add briefs/
          if git diff --staged --quiet; then
            echo "no change — the candles found nothing new."
          else
            git commit -m "beak: brief on ${{ inputs.topic }} ($(date -u +%Y%m%d-%H%M%S))"
            git push
          fi
