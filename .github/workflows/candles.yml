name: candles

# Prove the candles assemble on every push (offline self-test, no network).
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  selftest:
    name: do the candles assemble
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: --selftest (offline, stdlib only)
        run: python beak.py --selftest
